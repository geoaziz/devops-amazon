sonar.projectKey=GeoAziz_DevOps-Amazon
sonar.organization=geoaziz

# Source directories
sonar.sources=src,public
sonar.exclusions=node_modules/**,build/**,dist/**,.git/**

# Test directories
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.language=js

# Project metadata
sonar.projectName=Amazon Prime Clone
sonar.projectVersion=0.1.0

# Encoding
sonar.sourceEncoding=UTF-8

# Code coverage threshold (optional)
sonar.coverage.exclusions=node_modules/**,public/**,build/**

# Quality gate configuration
# Disabled until quality gate is configured in SonarCloud for this project
# sonar.qualitygate.wait=true
# sonar.qualitygate.timeout=300
