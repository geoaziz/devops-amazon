name: CI/CD Pipeline - Build, Scan & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAME: devmahn/amazon-clone-app
  SONAR_HOST_URL: https://sonarcloud.io

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write
      packages: write

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # Step 2: Install Node dependencies with caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install npm dependencies
        run: npm install --legacy-peer-deps
        continue-on-error: true

      - name: Resolve SonarCloud settings
        id: sonar_cfg
        run: |
          org="${{ secrets.SONAR_ORGANIZATION }}"
          if [ -z "$org" ]; then
            org="${{ secrets.SONAR_ORG }}"
          fi

          project="${{ secrets.SONAR_PROJECT_KEY }}"
          if [ -z "$project" ]; then
            project="${{ secrets.SONAR_PROJECT }}"
          fi

          echo "org=$org" >> "$GITHUB_OUTPUT"
          echo "project=$project" >> "$GITHUB_OUTPUT"

      - name: Validate SonarCloud configuration
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          missing=()

          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            missing+=("SONAR_TOKEN")
          fi

          if [ -z "${{ steps.sonar_cfg.outputs.org }}" ]; then
            missing+=("SONAR_ORGANIZATION or SONAR_ORG")
          fi

          if [ -z "${{ steps.sonar_cfg.outputs.project }}" ]; then
            missing+=("SONAR_PROJECT_KEY or SONAR_PROJECT")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing SonarCloud secrets: ${missing[*]}" >&2
            exit 1
          fi

          echo "SonarCloud secrets found."
          echo "Resolved sonar.organization: ${{ steps.sonar_cfg.outputs.org }}"
          echo "Resolved sonar.projectKey: ${{ steps.sonar_cfg.outputs.project }}"
          echo "Resolved sonar.host.url: ${{ env.SONAR_HOST_URL }}"

      - name: Validate SonarCloud token auth
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          auth_resp="$(curl -sS --retry 4 --retry-all-errors --retry-delay 2 -u "${SONAR_TOKEN}:" "${{ env.SONAR_HOST_URL }}/api/authentication/validate" || true)"
          if [ -z "$auth_resp" ]; then
            echo "SonarCloud auth endpoint returned an empty response (possible transient network issue)." >&2
            exit 1
          fi

          if ! echo "$auth_resp" | grep -q '"valid":'; then
            echo "Unexpected SonarCloud auth response: $auth_resp" >&2
            exit 1
          fi

          if ! echo "$auth_resp" | grep -q '"valid":true'; then
            echo "SONAR_TOKEN failed SonarCloud authentication. Rotate/rewrite the GitHub secret SONAR_TOKEN." >&2
            exit 1
          fi

          org_resp="$(curl -sS --retry 4 --retry-all-errors --retry-delay 2 -u "${SONAR_TOKEN}:" "${{ env.SONAR_HOST_URL }}/api/organizations/search?organizations=${{ steps.sonar_cfg.outputs.org }}" || true)"
          if [ -z "$org_resp" ]; then
            echo "SonarCloud organization check returned an empty response (possible transient network issue)." >&2
            exit 1
          fi

          if ! echo "$org_resp" | grep -q '"organizations"'; then
            echo "SONAR_TOKEN could not access SonarCloud organization: ${{ steps.sonar_cfg.outputs.org }}" >&2
            exit 1
          fi

          project_resp="$(curl -sS --retry 4 --retry-all-errors --retry-delay 2 -u "${SONAR_TOKEN}:" "${{ env.SONAR_HOST_URL }}/api/components/show?component=${{ steps.sonar_cfg.outputs.project }}" || true)"
          if [ -z "$project_resp" ]; then
            echo "SonarCloud project check returned an empty response (possible transient network issue)." >&2
            exit 1
          fi

          if ! echo "$project_resp" | grep -q '"component"'; then
            echo "SONAR_TOKEN could not access SonarCloud project: ${{ steps.sonar_cfg.outputs.project }}" >&2
            exit 1
          fi

          echo "SonarCloud token authentication succeeded."

      # Step 3: SonarCloud Analysis
      - name: SonarCloud Scan
        id: sonar_scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }}
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
            -Dsonar.projectKey=${{ steps.sonar_cfg.outputs.project }}
            -Dsonar.organization=${{ steps.sonar_cfg.outputs.org }}
        continue-on-error: ${{ github.event_name == 'pull_request' }}
      
      - name: Log SonarCloud Status
        if: always()
        run: |
          echo "SonarCloud config step outcome: ${{ steps.sonar_cfg.outcome }}"
          echo "SonarCloud scan outcome: ${{ steps.sonar_scan.outcome }}"
          echo "  Token exists: ${{ secrets.SONAR_TOKEN != '' }}"
          echo "  Resolved organization: ${{ steps.sonar_cfg.outputs.org }}"
          echo "  Resolved projectKey: ${{ steps.sonar_cfg.outputs.project }}"
          echo "  Host URL: ${{ env.SONAR_HOST_URL }}"

      # Step 4: Trivy Filesystem Scan
      - name: Run Trivy filesystem scan
        id: trivy_fs_scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      # Upload Trivy filesystem results
      - name: Upload Trivy filesystem results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-fs-scan'
        if: always() && hashFiles('trivy-fs-results.sarif') != ''
        continue-on-error: true

      # Step 5: Set up Docker Buildx with caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 6: Build Docker image with build number tag
      - name: Build Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Log Build Status
        run: |
          echo "✓ Docker image built successfully"
          echo "  Tags:"
          echo "    - ${{ env.IMAGE_NAME }}:latest"
          echo "    - ${{ env.IMAGE_NAME }}:${{ github.run_number }}"

      # Step 7: Trivy Image Scan
      - name: Run Trivy image scan
        id: trivy_image_scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.run_number }}
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      # Upload Trivy image results
      - name: Upload Trivy image results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: 'trivy-image-scan'
        if: always() && hashFiles('trivy-image-results.sarif') != ''
        continue-on-error: true

      # Step 8: Login to Docker Hub
      - name: Resolve Docker Hub credentials
        id: docker_creds
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "username=${{ secrets.DOCKERHUB_USERNAME }}" >> "$GITHUB_OUTPUT"
          else
            echo "username=${{ secrets.DOCKER_USERNAME }}" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "token=${{ secrets.DOCKERHUB_TOKEN }}" >> "$GITHUB_OUTPUT"
          else
            echo "token=${{ secrets.DOCKER_PAT }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log Docker credential source
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Docker credential source (values masked):"
          echo "  DOCKERHUB_USERNAME present: ${{ secrets.DOCKERHUB_USERNAME != '' }}"
          echo "  DOCKER_USERNAME present: ${{ secrets.DOCKER_USERNAME != '' }}"
          echo "  DOCKERHUB_TOKEN present: ${{ secrets.DOCKERHUB_TOKEN != '' }}"
          echo "  DOCKER_PAT present: ${{ secrets.DOCKER_PAT != '' }}"

      - name: Validate Docker Hub credentials exist
        run: |
          if [ -z "${{ steps.docker_creds.outputs.username }}" ] || [ -z "${{ steps.docker_creds.outputs.token }}" ]; then
            echo "Missing Docker Hub secrets. Set either DOCKERHUB_USERNAME/DOCKERHUB_TOKEN or DOCKER_USERNAME/DOCKER_PAT." >&2
            exit 1
          fi
          echo "Docker Hub credentials found."
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      - name: Validate Docker Hub credentials auth
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          status="$(curl -sS -o /tmp/docker_login_check.json -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -X POST "https://hub.docker.com/v2/users/login/" \
            -d "{\"username\":\"${{ steps.docker_creds.outputs.username }}\",\"password\":\"${{ steps.docker_creds.outputs.token }}\"}" || true)"

          if [ "$status" != "200" ] || ! grep -q '"token"' /tmp/docker_login_check.json; then
            echo "Docker Hub auth failed for provided GitHub secrets. Rotate/rewrite DOCKERHUB_TOKEN or DOCKER_PAT." >&2
            rm -f /tmp/docker_login_check.json
            exit 1
          fi

          rm -f /tmp/docker_login_check.json
          echo "Docker Hub credential authentication succeeded."

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.docker_creds.outputs.username }}
          password: ${{ steps.docker_creds.outputs.token }}
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      
      - name: Log Docker Login Status
        run: echo "✓ Successfully authenticated to Docker Hub"
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      # Step 9: Push Docker image to Docker Hub
      - name: Push Docker image to Docker Hub
        id: docker_push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.run_number }}
          cache-from: type=gha
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      
      - name: Log Push Status
        run: |
          echo "✓ Docker image pushed to Docker Hub"
          echo "  Image: ${{ env.IMAGE_NAME }}:${{ github.run_number }}"
          echo "  Registry: https://hub.docker.com/r/${{ env.IMAGE_NAME }}"
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      # Step 10: Update k8s deployment manifest with new image tag
      - name: Update k8s deployment manifest
        run: |
          echo "Updating k8s/deployment.yaml with image tag: ${{ github.run_number }}"
          sed -i "s|image:.*|image: ${{ env.IMAGE_NAME }}:${{ github.run_number }}|g" k8s/deployment.yaml
          
          echo ""
          echo "Updated manifest:"
          echo "==================="
          grep -A 2 "containers:" k8s/deployment.yaml | head -5
          echo ""
          echo "Full image line:"
          grep "image:" k8s/deployment.yaml
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      # Step 11: Commit and push manifest update back to repo
      - name: Commit and push manifest update
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote set-url origin "https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/${{ github.repository }}.git"
          
          echo "Checking for changes..."
          if git diff --quiet k8s/deployment.yaml; then
            echo "⚠ No changes to commit"
          else
            echo "✓ Changes detected, committing..."
            git add k8s/deployment.yaml
            git commit -m "chore: update image tag to ${{ github.run_number }} [skip ci]"
            
            echo "Pushing to main branch..."
            git push origin HEAD:main
            
            echo ""
            echo "✓ Manifest update pushed successfully"
            echo "  New image tag: ${{ github.run_number }}"
            echo "  ArgoCD will sync within ~3 minutes"
          fi
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      # Step 12: Pipeline Summary
      - name: Pipeline Summary
        if: always()
        run: |
          echo ""
          echo "╔════════════════════════════════════════╗"
          echo "║      Pipeline Execution Summary        ║"
          echo "╚════════════════════════════════════════╝"
          echo ""
          echo "Run Number: ${{ github.run_number }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo ""
          echo "Stage outcomes:"
          echo "  - Sonar config: ${{ steps.sonar_cfg.outcome }}"
          echo "  - Sonar scan: ${{ steps.sonar_scan.outcome }}"
          echo "  - Trivy filesystem scan: ${{ steps.trivy_fs_scan.outcome }}"
          echo "  - Docker build: ${{ steps.docker_build.outcome }}"
          echo "  - Trivy image scan: ${{ steps.trivy_image_scan.outcome }}"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "  - Docker push: ${{ steps.docker_push.outcome }}"
          fi
          echo ""
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "✓ Production Pipeline Executed"
            echo "  - Code scanned for quality and vulnerabilities"
            echo "  - Docker image built and pushed to Docker Hub"
            echo "  - Kubernetes manifest updated"
            echo "  - ArgoCD will deploy changes automatically"
            echo ""
            echo "Next Steps:"
            echo "  1. Check ArgoCD UI: https://localhost:8080"
            echo "  2. Wait for app status to change from OutOfSync → Healthy"
            echo "  3. Check your app: http://localhost:3000"
          else
            echo "✓ Preview Pipeline Executed"
            echo "  - Code scanned for quality and vulnerabilities"
            echo "  - Docker image built (not pushed)"
            echo "  - No deployment triggered on PR"
          fi
          echo ""
          echo "Run logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

